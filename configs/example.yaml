# Example CHAP model configuration for the weekly AR model.
#
# Pass it to a run with `chap eval --model-configuration-yaml configs/example.yaml ...`.
# Both keys are optional:
#   - user_option_values overrides the tunable knobs declared in MLproject
#     (architecture, ensemble size, training length, horizon, ...).
#   - additional_continuous_covariates names extra covariate columns to feed the
#     network on top of the required rainfall/mean_temperature/population. Leave it
#     out (or empty) for datasets like Laos that carry only the required three.
user_option_values:
  context_length: 52
  prediction_length: 12
  n_ensemble: 5
  n_iter: 1000
  learning_rate: 0.00001
  cell: gru
  dropout_rate: 0.2
# additional_continuous_covariates: [relative_humidity]
