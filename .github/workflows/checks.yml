name: checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run checks (ruff + mypy + pyright)
        run: make check

      - name: Run tests (self-contained train/predict)
        run: make test

      - name: chap eval integration (chap CLI via uvx, no chap-core dependency)
        run: make eval
